# 店掌柜店铺经营模块配置

spring:
  datasource:
    dynamic:
      # 店铺经营服务默认数据源使用 dzg_shop；框架菜单和权限仍在 dzg_cloud。
      primary: master
      seata: false
      datasource:
        master:
          type: ${spring.datasource.type}
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: ${datasource.shop.url}
          username: ${datasource.shop.username}
          password: ${datasource.shop.password}
  cloud:
    sentinel:
      enabled: false

shop:
  tenant-id: "000000"
  ai:
    enabled: true
    provider: deepseek
    base-url: https://api.deepseek.com
    api-key: ${deepseek.api-key:}
    model: deepseek-v4-flash
    timeout-seconds: 8
    cache-seconds: 300
